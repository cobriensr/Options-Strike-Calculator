# Pre-commit acceptance thresholds for the E1.4 PAC backtest sweep.
#
# LOCKED BEFORE ANY SWEEP RUNS. The point of this file is to
# prevent researcher-degrees-of-freedom overfitting: we commit to the
# rejection criteria up front, then honor them when results come back.
# Per Harvey (2017, AFA Presidential Address, "The Scientific Outlook
# in Financial Economics"), pre-registration is the only real defense
# against multiple-testing bias in backtesting.
#
# Rule: if any threshold in `thresholds:` fails, the config is rejected.
# Cross-market gate (`cross_market_gate.require_pass_on_all_markets`)
# means a config must pass on NQ AND ES independently — a config that
# works on one market but not the other is treated as asset-specific
# noise, not transferable edge.
#
# ANY EDIT TO THIS FILE must bump `version` and note the reason in the
# plan doc amendment history. No silent tightening or loosening.

version: 3
committed_ts: 2026-04-20T13:35:00-05:00
# commit_hash_when_locked is stamped by run_sweep.py on first use —
# records the git SHA of this file when a sweep was first executed
# against it. Prevents "I edited the thresholds after I saw results".
commit_hash_when_locked: null

# --- Markets this sweep evaluates ---
markets:
  - symbol: NQ
    apply_thresholds: true
  - symbol: ES
    apply_thresholds: true

# --- Cross-market consistency gate ---
cross_market_gate:
  # When true, a config must pass ALL thresholds on BOTH markets to be
  # promoted to the "cross_market_pass" bucket. Configs passing only one
  # market are bucketed into "nq_only" / "es_only" for post-hoc review,
  # never auto-promoted.
  require_pass_on_all_markets: true

# --- Per-market thresholds ---
# Each config's metrics on each market are checked against every entry
# below. Failing any single threshold rejects the config for that market.
thresholds:
  # Probability of Backtest Overfitting. Lopez de Prado & Bailey (2017),
  # SSRN 2326253. Reject if the best in-sample config's rank distribution
  # over OOS folds suggests it's likely a coin-flip winner. Rigorous shops
  # want < 0.2; 0.3 is our entry bar for "not obviously overfit."
  pbo_max: 0.3

  # Deflated Sharpe Ratio. Bailey & Lopez de Prado (2014), SSRN 2460551.
  # Adjusts Sharpe for the number of effective independent trials. Must
  # be strictly > 0 at 95% confidence to reject the null of zero edge.
  dsr_min_95ci: 0.0

  # Walk-forward robustness: out-of-sample Sharpe must be at least 70%
  # of in-sample Sharpe. A bigger drop suggests the IS result was a
  # product of fitting, not edge.
  oos_vs_is_sharpe_min: 0.7

  # Statistical significance floor. Sharpe on 20 trades is meaningless.
  # 200 trades per fold ≈ tight CI around expectancy.
  min_trades_per_fold: 200

  # Emotional-survivability cap. A 20% drawdown on small-account futures
  # is tolerable; 30%+ is not, independent of how impressive the eventual
  # P&L is. Kelly-optimal sizing often implies > 50% DD — we don't care
  # about Kelly optimality, we care about keeping the account alive.
  max_drawdown_pct: 0.20

  # Profit factor. Must clear the gross-wins/gross-losses hurdle after
  # commissions and slippage. 1.4 is the usual "meaningful edge after
  # costs" threshold — 1.0 means breakeven, below 1.0 means losing.
  profit_factor_min: 1.4

  # Parameter stability: perturb each float parameter by ±1 step. If the
  # resulting P&L drops > 30%, the config is a knife-edge over-fit, not
  # a robust region. Reject. (Computed in post-sweep analysis, not every
  # Optuna trial.)
  param_stability_max_drop: 0.30

# --- DSR effective trial count ---
# The Deflated Sharpe Ratio needs to know how many *effective*
# independent trials the search actually explored. Raw Optuna trials
# overstate independence because TPE/Bayesian search clusters samples
# in high-Sharpe regions — many trials are near-duplicates. We estimate
# the effective count by clustering parameter-space points at the
# correlation threshold below.
effective_trial_estimation:
  method: 'param_cluster'
  correlation_threshold: 0.7
  # Note: with the v5 broadened entry-trigger scope (CHoCH + BOS + 8
  # variants) and v1 options filters, naive trial count grows ~5x vs
  # the v1 plan. Effective trial count likely grows 2-3x, which raises
  # the DSR hurdle by ~0.2-0.3 Sharpe. That's the cost of a bigger
  # sweep — per the plan, we accept it rather than trimming the sweep.

# --- Cost model ---
# Every sweep run uses the same cost model. Any change here must bump
# `version` and be flagged in plan amendments — you can't silently
# improve results by "correcting" commission downward.
fill_model:
  spread_cross: true
  extra_slippage_ticks: 0.5
  commission_per_rt:
    MNQ: 1.90
    NQ: 4.00
    MES: 1.90
    ES: 4.00

# --- Sweep methodology ---
sweep:
  # CPCV (Combinatorially Purged Cross-Validation) params — Lopez de
  # Prado, Advances in Financial Machine Learning (2018), Ch. 7.
  cpcv_n_groups: 6
  cpcv_k_test_groups: 2 # 6 choose 2 = 15 OOS paths

  # Embargo: bars discarded on each side of a test window. Rule of thumb
  # is 2-3x max trade duration. At 1m bars with trades up to 60 min, 180
  # min = 180 bars is the safe floor. We use 240 to be conservative.
  embargo_bars: 240

  # Purge: training bars whose trade's exit lands inside a test window
  # are dropped. Set by the sweep orchestrator per-config (requires
  # knowing trade durations), not here.

  # Optuna-inside-fold: run an independent Optuna study in each CPCV
  # training partition. Wiecki et al. (2016) — running one Optuna
  # study on the full history then walk-forward-testing the winner
  # is what causes the cluster overfit.
  optuna_trials_per_fold: 150
  optuna_sampler: 'TPE'
  optuna_pruner: 'MedianPruner'

  # joblib parallelism. Each backtest run is embarrassingly parallel;
  # one CPU core per config. Numba is not used on Python 3.14 (it
  # crashes). Pure-Python loop + 10-way joblib = ~250 configs/min.
  joblib_n_jobs: -1 # -1 = all CPU cores

# --- Bootstrap method for confidence intervals ---
bootstrap:
  # Stationary bootstrap (Politis & Romano 1994). Block length is chosen
  # as geometric mean of trade durations in bars. Reuses the bar returns
  # series rather than the trade-level P&L (higher-resolution CI).
  method: 'stationary'
  block_length_source: 'auto' # auto = geometric mean of trade durations
  n_resamples: 1000
