[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (undefined names, unused imports)
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modernize syntax to 3.13)
    "B",    # flake8-bugbear (common bug patterns)
]
ignore = [
    "E501",  # line too long — handled by formatter
    "E402",  # import order — tests import after conftest path setup; utils after warnings
    "E712",  # == True/False — correct idiom for pandas boolean Series masking
    "B905",  # zip() strict= — noisy for matplotlib/numpy zips of known-equal length
]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = [
  "--tb=short",
  "--strict-markers",
  "-q",
]
markers = [
  "slow: tests that read from the local Parquet archive (skip with -m 'not slow')",
]
filterwarnings = [
  "ignore:vert.*will be deprecated:PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["src"]
omit = [
  ".venv/*",
  "tests/*",
  "__pycache__/*",
  "experiments/*",
  "plots/*",
  # ── Run-once research / EDA / plotting scripts ────────────────────────────
  # Standalone analyses executed via `make` targets (eda, moc-*, nq-flow-*,
  # etc.), imported by nothing and not intended to carry unit tests. Measuring
  # them blended the maintained-library surface (~85%) with ~7k untested
  # research statements, dragging the headline coverage to ~42%. Omitting them
  # makes the metric reflect the code we actually maintain. Production/library
  # modules (multileg_*, takeit/*, score_components, setups_backtest harness,
  # etc.) are deliberately NOT omitted.
  "src/moc_*.py",
  "src/eod_flow_*.py",
  "src/nq_flow_leadership/*.py",
  "src/periscope_eda/*.py",
  "src/cross_section_eda*.py",
  "src/vega_spike_eda.py",
  "src/payoff_eda_probe.py",
  "src/whale_plots.py",
  "src/compute_realized_outcomes.py",
  "src/lottery_exit_policies.py",
  "src/setups_backtest/cli.py",
  "src/setups_backtest/evaluators/setup_0_smoke.py",
  "src/setups_backtest/evaluators/setup_1a_nq_ofi_extreme_daily.py",
  "src/takeit/generate_parity_fixture.py",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
precision = 1
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.",
  "if TYPE_CHECKING:",
]

[tool.coverage.html]
directory = "htmlcov"
