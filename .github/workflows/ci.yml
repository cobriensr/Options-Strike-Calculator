name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which paths changed so downstream jobs can skip when irrelevant
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      app: ${{ steps.filter.outputs.app }}
      ml: ${{ steps.filter.outputs.ml }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'api/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vite.config.ts'
              - 'eslint.config.ts'
              - 'vitest.config.ts'
            ml:
              - 'ml/**'
            e2e:
              - 'src/**'
              - 'api/**'
              - 'e2e/**'
              - 'playwright.config.ts'

  app:
    name: App Quality Gate
    needs: [changes]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Review (tsc + eslint + prettier + vitest)
        run: npm run review

      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    needs: [changes, app]
    if: github.event_name == 'workflow_dispatch' && needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  ml:
    name: ML Quality Gate
    needs: [changes]
    if: needs.changes.outputs.ml == 'true'
    runs-on: ubuntu-latest
    env:
      PYTHON: python
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Lint, Format Check & Tests
        run: cd ml && make review
