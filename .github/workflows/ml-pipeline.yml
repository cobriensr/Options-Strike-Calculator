name: ML Pipeline

on:
  schedule:
    # 01:45 UTC Tue-Sat (covers Mon-Fri trading days)
    # Runs after build-features cron completes at 01:00 UTC
    - cron: '45 1 * * 2-6'
  workflow_dispatch:

# Default to read-only at the workflow level. The pipeline job needs
# `contents: write` to push the findings/plots commit at the end; the
# takeit-retrain job only uploads to Blob and inherits the read-only
# default — minimizes the blast radius if either job's runner is ever
# compromised.
permissions:
  contents: read

concurrency:
  group: ml-pipeline
  cancel-in-progress: true

jobs:
  pipeline:
    name: Run ML Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHON: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Node dependencies
        # Pinned to the exact version in the committed package-lock.json
        # (AUD-M35). This step runs with `contents: write` + the prod
        # DATABASE_URL in scope, so an unpinned install is a supply-chain
        # exposure — a malicious newer publish could exfiltrate the token.
        run: npm install @vercel/blob@2.4.0

      - name: Lint & format check
        run: cd ml && make lint

      - name: Run full pipeline
        run: cd ml && make all
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload plots to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          node --input-type=module -e "
          import { put } from '@vercel/blob';
          import { readdirSync, readFileSync } from 'fs';
          import { join } from 'path';

          const plotsDir = join(process.cwd(), 'ml', 'plots');
          const files = readdirSync(plotsDir).filter(f => f.endsWith('.png'));

          console.log('Found ' + files.length + ' plots to upload');

          for (const file of files) {
            const filePath = join(plotsDir, file);
            const fileBuffer = readFileSync(filePath);
            const blobPath = 'ml-plots/latest/' + file;

            const blob = await put(blobPath, fileBuffer, {
              access: 'private',
              addRandomSuffix: false,
              allowOverwrite: true,
            });

            console.log('Uploaded: ' + file + ' -> ' + blob.url);
          }

          console.log('All plots uploaded successfully');
          "

      - name: Trigger Claude analysis
        continue-on-error: true
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}
        run: |
          response=$(curl -sL -X POST "https://$VERCEL_URL/api/ml/analyze-plots" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -H "x-vercel-protection-bypass: $VERCEL_BYPASS_SECRET" \
            --max-time 900 \
            -w "\n%{http_code}" 2>&1) || true

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" != "200" ]; then
            echo "::warning::Claude analysis returned HTTP $http_code — analysis may be incomplete"
          fi

      - name: Commit findings.json + plots
        # Plots are version-controlled per project convention so the user
        # can review historical visualizations without round-tripping to
        # Vercel Blob. The Blob upload above is for the frontend carousel;
        # this commit is for git history.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ml/plots/*.png 2>/dev/null || true
          git add ml/findings.json
          git diff --staged --quiet || (
            git commit -m "chore(ml): update pipeline findings + plots [skip ci]" &&
            git pull --rebase --autostash &&
            git push
          )

  takeit-retrain:
    # Spec: docs/superpowers/specs/takeit-phase3-production-scoring-2026-05-16.md
    # No untrusted input (github.event.*) is used in any `run:` block here —
    # only repository checkout content, computed file paths, and secrets via
    # `env:`. The hook on GH Actions workflow edits is informational.
    name: Retrain take-it XGBoost classifiers + upload bundle to Blob
    needs: pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      PYTHON: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ml/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Node dependencies for Blob upload
        # Pinned to the exact version in the committed package-lock.json
        # (AUD-M35). This job holds the prod DATABASE_URL + Blob token in
        # `env:`, so an unpinned install is a supply-chain exposure.
        run: npm install @vercel/blob@2.4.0

      - name: Build training set from production DB
        run: PYTHONPATH=. python -m ml.src.takeit.build_training_set

      - name: Train + calibrate + emit JSON bundles
        run: PYTHONPATH=. python -m ml.src.takeit.train

      - name: Brier drift gate (BRIER_ALERT_THRESHOLD=0.27)
        run: |
          python - <<'PY'
          import json
          from datetime import date
          for at in ('lottery', 'silentboom'):
              path = f'ml/findings/takeit-v1-{date.today().isoformat()}/{at}_metrics.json'
              m = json.load(open(path))
              brier = m['oof_brier']
              ok = m['brier_ok']
              print(f'[brier-gate] {at}: oof_brier={brier:.4f} ok={ok}')
              if not ok:
                  print(f'::warning::{at} oof_brier {brier:.4f} > 0.27 — model calibration may be drifting')
          PY

      - name: Upload bundles to Vercel Blob
        run: node scripts/upload_takeit_bundles.mjs

      - name: Summary
        run: |
          echo "::notice::take-it retrain complete; new bundles uploaded to Vercel Blob"
          ls -lh ml/data/takeit/*.json
