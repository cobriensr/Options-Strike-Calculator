# Local development stack — start with: docker compose -f docker-compose.dev.yml up -d
#
# Provides a local Postgres instance so you can develop without hitting Neon.
# The sidecar service is included but commented out (needs DATABENTO_API_KEY).
#
# After starting, set DATABASE_URL in .env.local:
#   DATABASE_URL=postgresql://strike:strike@localhost:5432/strike_dev

services:
  postgres:
    image: postgres:17
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: strike_dev
      POSTGRES_USER: strike
      POSTGRES_PASSWORD: strike
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'strike', '-d', 'strike_dev']
      interval: 5s
      timeout: 3s
      retries: 5

  # Uncomment to run the Databento futures sidecar locally.
  # Requires DATABENTO_API_KEY in sidecar/.env
  #
  # Streams OHLCV-1m bars for ES, NQ, ZN, RTY, CL, GC (CME/GLBX.MDP3),
  # VX front + second month (CBOE/XCBF.PITCH), and DX (ICE/IFUS.IMPACT).
  # Also subscribes to ES options trades/statistics/definitions.
  #
  # sidecar:
  #   build: ./sidecar
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://strike:strike@postgres:5432/strike_dev
  #     DATABENTO_API_KEY: ${DATABENTO_API_KEY}
  #     LOG_LEVEL: INFO
  #   ports:
  #     - '8080:8080'

volumes:
  pgdata:
