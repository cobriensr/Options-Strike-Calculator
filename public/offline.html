<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strike Calculator - Offline</title>
    <style>
      body {
        font-family: Georgia, serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
      }
      .container {
        max-width: 400px;
        padding: 2rem;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #94a3b8;
        line-height: 1.6;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You're offline</h1>
      <p>
        The Strike Calculator needs an internet connection to fetch live market
        data and run calculations.
      </p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
