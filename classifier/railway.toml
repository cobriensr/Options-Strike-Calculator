[deploy]
watchPatterns = ["classifier/**", "ml/src/multileg_*.py"]

# Railway-level healthcheck so unhealthy instances get RECYCLED by the
# platform, not just OOM-killed by the kernel. The Docker HEALTHCHECK in
# the Dockerfile is NOT used by Railway for instance management — only
# this `healthcheckPath` is. `/health` is an unconditional 200-OK
# liveness probe (server.py do_GET): it returns ok as long as the process
# is alive AND a worker thread is free to service the request. During the
# market-open request burst, if the box is thrashing toward OOM the probe
# starts failing/timing out, and Railway restarts the instance cleanly
# instead of waiting for the kernel SIGKILL. Unlike uw-stream's /healthz
# (which 503s on legitimately-silent windows), /health has no
# false-negative path, so wiring it here is safe.
healthcheckPath = "/health"
# 30s: generous for a liveness probe whose handler does no I/O. Tighter
# than Railway's 300s default so a wedged/OOM-thrashing instance is
# recycled within ~30s during the open burst rather than lingering for
# five minutes. server.py uses ThreadingHTTPServer (thread-per-request) and
# /health never acquires the classify BoundedSemaphore (cap = 1 in
# multileg_routes.py), so the probe stays responsive even when the classify
# slot is busy — 30s is comfortable headroom for its no-I/O handler.
healthcheckTimeout = 30

# MEMORY CEILING — NOT settable in railway.toml.
# Railway's config-as-code (railway.toml/json) only covers the `build`
# and `deploy` sections; per-replica memory/CPU limits live on a separate
# API surface (`serviceInstanceLimits` read / `serviceInstanceLimitsUpdate`
# write; dashboard "Replica Limits"), which is why sidecar/railway.toml
# carries only watchPatterns despite running with a 24 GB dashboard limit.
# Set the classifier ceiling in the Railway dashboard
# (Service → Settings → Deploy → Replica Limits) or — reproducibly — via
# `scripts/set-classifier-memory-limit.mjs`. Both paths and the exact
# GraphQL mutation/input are documented in classifier/README.md
# ("Memory limit" section). NOTE: the API takes `memoryGB` (GB), not bytes.
#
# Recommended ceiling: keep the 24 GB host limit — DO NOT set 8 GB.
# An earlier revision recommended an 8 GB ceiling on the premise that
# "concurrency 2 + 500K caps → ~8 GB peak." That premise was FALSIFIED on
# 2026-06-09: live MEMORY_USAGE_GB peaked at 28.88 GB @ 17:29 UTC (per-minute
# sample; sub-minute spikes higher) and the 24 GB box OOM-looped all day on
# exactly those settings. An 8 GB ceiling would hard crash-loop the service
# every busy window — strictly worse.
# In-process bounds after the 2026-06-09 hotfix (lower = tighter memory):
#   - _CLASSIFY_CONCURRENCY = 1        (multileg_routes.py)    [was 2]
#   - _CROSS_JOIN_PAIR_CAP  = 250_000  (multileg_assembler.py) [was 500_000]
#   - _MAX_CELL_ROWS_PER_CLASSIFY = 500_000 (per-ticker overload skip)
# Concurrency 2 → 1 means only ONE request's peak is ever live; cap
# 500K → 250K halves the largest cross-join intermediate. Together they
# should pull the open-window peak well under 24 GB. Leave the host 24 GB
# limit for headroom and let the /health healthcheck recycle any residual
# wedge. Only AFTER re-measuring the open-window peak on the new settings
# should an explicit ceiling be considered — and never below that observed
# peak. `scripts/set-classifier-memory-limit.mjs` exists to set one
# reproducibly if/when that measurement justifies it.
