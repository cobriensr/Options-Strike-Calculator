[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # function call in argument defaults — pydantic Field() is fine
]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Both src/ AND _vendored_ml/ — tests import from both top-level namespaces.
pythonpath = ["src", "_vendored_ml"]
# --cov-fail-under=95 matches the coverage gate in the 2026-05-28 spec.
addopts = "-q --strict-markers --strict-config --cov=src --cov-fail-under=95 --cov-branch --cov-report=term-missing"
